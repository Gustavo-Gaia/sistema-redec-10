name: Disparar Robo de Coleta
on:
  schedule:
    # Roda a cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  chamar-robo:
    runs-on: ubuntu-latest
    steps:
      - name: Chamando a API de coleta na Vercel
        run: |
          # Usa -s para modo silencioso e captura o JSON
          # O 'jq .' formata o JSON para ficar legível no log
          resultado=$(curl -sS https://sistema-redec-10.vercel.app/api/robo-coleta)
          echo "Relatório do Robô:"
          echo $resultado | jq .
